cmd:
  player_only: "&cOnly players can run this command."
  admin_only: "&cYou do not have permission to run this command."
  unknown: "&cUnknown subcommand. Use /{0} help."
  help:
    - "&6===== MineBingo Commands ====="
    - "&e/{0} menu &7Open the lobby menu"
    - "&e/{0} join [team] &7Join the game (auto-assigned if omitted)"
    - "&e/{0} leave &7Leave your team"
    - "&e/{0} team <team> [player] &7Move a player to a team"
    - "&e/{0} card &7Show your team's bingo card"
    - "&e/{0} cardchoose <pool> &7Select the card pool for the next round"
    - "&e/{0} start|forcestart|end|status|lockteams|setlobby &7Admin commands"
    - "&e/{0} goto <lobby|game|nether|end> &7Teleport to a world"
    - "&e/{0} wait &7Extend the start countdown"
    - "&e/{0} remix <event|random|off|clear|status> &7Control the next round's remix"
    - "&7Teams: red/orange/yellow/green/aqua/blue/purple/white/spectator"
  join:
    ok: "&aJoined {0}&a."
    usage: "&cUsage: /{0} join [red|orange|yellow|green|aqua|blue|purple|white|spectator]"
    locked: "&cTeams are locked; you cannot join or switch right now."
  leave: "&7You left Bingo."
  team:
    usage: "&cUsage: /{0} team <red|orange|yellow|green|aqua|blue|purple|white|spectator> [player]"
    ok: "&aMoved &f{0}&a to {1}&a."
    not_found: "&cCould not find player {0}."
  lockteams:
    usage: "&cUsage: /{0} lockteams <on|off>"
    "on": "&aTeams locked; players can no longer join or switch teams."
    "off": "&aTeams unlocked; players may join or switch freely."
  setlobby:
    ok: "&aLobby spawn set: {0} {1} {2} {3}"
    must_in_lobby: "&cStand in lobby world {0} first."
  goto:
    usage: "&cUsage: /{0} goto <lobby|game|nether|end|world>"
    no_world: "&cWorld {0} not found."
    ok: "&aTeleported to {0}."
  wait:
    not_countdown: "&cThere is no start countdown running."
    ok: "&aCountdown extended, {0} seconds remaining."
  status: "&7State: {0} &7| Online: &b{1} &7| Playing: &b{2} &7| Locked: {3} &7| Resetting: {4}"
  no_card: "&cNo bingo card is active."
  cardchoose:
    usage: "&cUsage: /{0} cardchoose <pool> &7Current: &f{1}"
    ok: "&aSelected card pool &f{0}&a ({1} tasks). It applies to the next round."
    not_found: "&cCard pool &f{0}&c was not found or could not be loaded. Check plugins/MineBingo/cards/{0}.yml."
    busy: "&cThe game is already voting or running. Switch card pools from the lobby."
  list:
    header: "&6===== Team List ====="
    entry: "{0}&7 ({1}): &f{2}"
  remix:
    unknown: "&cUsage: /{0} remix <event|random|off|clear|status>"
    forced: "&aNext round will trigger remix: &d{0}&a."
    forced_random: "&aNext round will trigger a &drandom remix&a."
    forced_off: "&aNext round will have &7no&a remix."
    cleared: "&aRemix override cleared; next round rolls by chance."
    status: "&7Remix: enabled {0} &7| chance &b{1}% &7| next forced: &d{2}"
