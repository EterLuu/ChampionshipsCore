    name: "&aDomination"
    lore:
      - "&7Each cell is claimed by the first team"
      - "&7to finish it; others can't take it after."
      - "&7Make a line in your colour to win;"
      - "&7if no team can still make a line, it settles by most completed;"
      - "&7board full or timeout → most completed wins."
