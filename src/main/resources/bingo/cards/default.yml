# MineBingo default card pool.
# Copy this file or add another .yml file in plugins/MineBingo/cards/ to create custom card pools.
# Select a pool with /mb cardchoose <name>.
#
# Categories group tasks by their main bottleneck. Only one member from a category can appear on a card.
# Material/entity/stat patterns support * and ? and expand to matching enum names while keeping the same category.
#
# NOTE: this pool only describes WHAT to do. Difficulty is no longer stored here — it lives entirely in
# the tier list (tierlists/<name>.yml, selected by config cards.tierlist), which ranks objectives by id.
# Objectives missing from the active tier list fall back to MEDIUM.

