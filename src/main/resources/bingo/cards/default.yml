  # one_of (集合任务 / collect any one): 拿到列表中任意一种即完成。列表支持 * / ? 通配符。
  #   icon  — 容器界面显示的固定代表图标（省略则取列表第一个）。
  #   name  — 可选显示名；省略时自动显示本地化的“任意：<icon 物品名>”。
  #   地图卡面的图标会用其中最多 4 个成员拼成（2/3/4 个分别为左右/品字/田字）。
  # 集合可以是颜色家族（床、羊毛），也可以是种类家族（木板、原矿）。
  sets:
    # 颜色家族 / colour families
    - { one_of: ["*_BED"], icon: RED_BED }
    - { one_of: ["*_WOOL"], icon: WHITE_WOOL }
    - { one_of: ["*_CARPET"], icon: BLUE_CARPET }
    - { one_of: ["*_CANDLE"], icon: ORANGE_CANDLE }
    - { one_of: ["*_CONCRETE_POWDER"], icon: LIME_CONCRETE_POWDER }
    - { one_of: ["*_CONCRETE"], icon: LIME_CONCRETE }
    - { one_of: ["*_STAINED_GLASS"], icon: CYAN_STAINED_GLASS }
    - { one_of: ["*_GLAZED_TERRACOTTA"], icon: MAGENTA_GLAZED_TERRACOTTA }
    - { one_of: ["*_SHULKER_BOX"], icon: RED_SHULKER_BOX }
    # 种类家族 / type families
    - { one_of: ["*_PLANKS"], icon: OAK_PLANKS }
    - { one_of: ["*_SAPLING"], icon: BIRCH_SAPLING }
    - { one_of: ["*_LEAVES"], icon: OAK_LEAVES }
    - { one_of: [TUBE_CORAL, BRAIN_CORAL, BUBBLE_CORAL, FIRE_CORAL, HORN_CORAL], icon: BRAIN_CORAL }
    - { one_of: [RAW_IRON, RAW_COPPER, RAW_GOLD], icon: RAW_IRON, count: 3 }
    - { one_of: ["*_HORSE_ARMOR"], icon: IRON_HORSE_ARMOR }
    - { one_of: ["MUSIC_DISC_*"], icon: MUSIC_DISC_CAT }
    - { one_of: ["*_DYE"], icon: RED_DYE }
    - { one_of: ["*_BANNER"], icon: WHITE_BANNER }
    - { one_of: [ZOMBIE_HEAD, SKELETON_SKULL, CREEPER_HEAD, PIGLIN_HEAD, WITHER_SKELETON_SKULL], icon: SKELETON_SKULL }
    - { one_of: [PUFFERFISH_BUCKET, TROPICAL_FISH_BUCKET, COD_BUCKET, SALMON_BUCKET, AXOLOTL_BUCKET, TADPOLE_BUCKET], icon: TROPICAL_FISH_BUCKET }
    - { one_of: ["*_ARMOR_TRIM_SMITHING_TEMPLATE"], icon: SENTRY_ARMOR_TRIM_SMITHING_TEMPLATE }
  advancements:
